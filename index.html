<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Punktezähler</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #1b1f27;
    color: #f0f2f5;
    overflow: hidden;
  }
  .app {
    height: 100vh;
    max-width: 1300px;
    margin: 0 auto;
    padding: 14px;
    padding: max(14px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(14px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Punktestände + Trümpfe gesamt + Reset (obere Leiste) */
  .scores {
    display: flex;
    gap: 12px;
    flex: 0 0 auto;
  }
  .score {
    flex: 1;
    background: #262c38;
    border-radius: 16px;
    padding: 12px 8px;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .score .label { font-size: 16px; opacity: 0.75; margin-bottom: 4px; }
  .score .value { font-size: 44px; font-weight: 700; line-height: 1; }
  .score.allein { box-shadow: inset 0 0 0 2px #4f8cff; }
  .score.gegen  { box-shadow: inset 0 0 0 2px #ff8a4f; }
  .score.trumpf-total { box-shadow: inset 0 0 0 2px #36b37e; }
  .score.trumpf-total .value { color: #36b37e; }
  .scores .reset {
    flex: 0 0 120px;
    font-size: 20px;
    padding: 0;
    background: #c8453c;
  }
  .scores .mic {
    flex: 0 0 86px;
    font-size: 30px;
    padding: 0;
    background: #3a4254;
  }
  .scores .mic.on {
    background: #36b37e;
    animation: micpulse 1.1s ease-in-out infinite;
  }
  @keyframes micpulse {
    0%, 100% { filter: brightness(1); }
    50%      { filter: brightness(1.4); }
  }

  /* Status-/Erkennungszeile */
  .voicebar {
    flex: 0 0 auto;
    font-size: 16px;
    color: #cdd3dd;
    background: #222834;
    border-radius: 10px;
    padding: 6px 12px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .voicebar.ok  { color: #8fe3b8; }
  .voicebar.bad { color: #ffb27a; }

  /* Hauptbereich füllt die restliche Höhe */
  .main {
    flex: 1;
    min-height: 0;
    display: flex;
    gap: 12px;
  }

  button {
    border: none;
    border-radius: 16px;
    font-weight: 600;
    color: #f0f2f5;
    background: #3a4254;
    cursor: pointer;
    touch-action: manipulation;
    transition: transform 0.05s, filter 0.1s, background 0.1s;
  }
  button:active { transform: scale(0.96); filter: brightness(1.2); }

  /* Zahlenblock 3x4 – füllt Breite und Höhe */
  .pad {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 12px;
  }
  .pad button { font-size: 56px; }
  .pad .tens { background: #495267; }
  .pad button.active { background: #e0a82e; color: #1b1f27; }

  /* Trumpf-Spalte (0-3 untereinander) */
  .trumpf {
    flex: 0 0 130px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .trumpf button { flex: 1; font-size: 46px; }
  .trumpf button.active { background: #36b37e; color: #fff; }

  /* Spieler-Buttons (untereinander links) */
  .assign {
    flex: 0 0 230px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .assign button { flex: 1; font-size: 26px; line-height: 1.2; }
  .assign .allein { background: #4f8cff; }
  .assign .gegen  { background: #ff8a4f; }

  /* Historie (rechts) */
  .history {
    flex: 0 0 230px;
    background: #262c38;
    border-radius: 16px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow: hidden;
  }
  .history .h-title {
    flex: 0 0 auto;
    font-size: 15px;
    opacity: 0.7;
    text-align: center;
    margin-bottom: 2px;
  }
  .history .h-list {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow: hidden;
  }
  .hist-head,
  .hist-item {
    display: grid;
    grid-template-columns: 26px 1fr 1fr 26px;
    align-items: center;
    gap: 4px;
  }
  .hist-head {
    flex: 0 0 auto;
    font-size: 13px;
    opacity: 0.75;
    padding: 0 10px 2px;
  }
  .hist-item {
    flex: 0 0 auto;
    background: #3a4254;
    border-radius: 10px;
    padding: 7px 10px;
    font-size: 19px;
    font-variant-numeric: tabular-nums;
  }
  .hist-item .no,
  .hist-head .no { opacity: 0.55; font-size: 14px; }
  .hist-item .a,
  .hist-head .a { color: #4f8cff; text-align: right; font-weight: 600; }
  .hist-item .g,
  .hist-head .g { color: #ff8a4f; text-align: right; font-weight: 600; }
  .hist-item .t,
  .hist-head .t { text-align: right; opacity: 0.7; font-size: 14px; }
  .hist-head .a,
  .hist-head .g { font-weight: 500; }
</style>
</head>
<body>
<div class="app">

  <div class="scores">
    <div class="score allein">
      <div class="label">Alleinspieler</div>
      <div class="value" id="scoreAllein">0</div>
    </div>
    <div class="score gegen">
      <div class="label">Gegenspieler</div>
      <div class="value" id="scoreGegen">0</div>
    </div>
    <div class="score trumpf-total">
      <div class="label">Trümpfe</div>
      <div class="value" id="trumpfTotal">0</div>
    </div>
    <button class="mic" id="mic" title="Spracheingabe an/aus">🎤</button>
    <button class="reset" id="reset">Reset</button>
  </div>

  <div class="voicebar" id="voicebar">Spracheingabe aus – 🎤 antippen. Sag z.&nbsp;B. „Allein vierzehn, zwei" oder „Gegner 25, 1".</div>

  <div class="main">
    <div class="assign">
      <button class="allein" id="toAllein">+ Alleinspieler</button>
      <button class="gegen" id="toGegen">+ Gegenspieler</button>
    </div>

    <div class="pad">
      <button class="tens" data-tens="10">10</button>
      <button class="tens" data-tens="20">20</button>
      <button class="tens" data-tens="30">30</button>
      <button data-unit="1">1</button>
      <button data-unit="2">2</button>
      <button data-unit="3">3</button>
      <button data-unit="4">4</button>
      <button data-unit="5">5</button>
      <button data-unit="6">6</button>
      <button data-unit="7">7</button>
      <button data-unit="8">8</button>
      <button data-unit="9">9</button>
    </div>

    <div class="trumpf" id="trumpfOpts">
      <button data-trumpf="0">0</button>
      <button data-trumpf="1">1</button>
      <button data-trumpf="2">2</button>
      <button data-trumpf="3">3</button>
    </div>

    <div class="history">
      <div class="h-title">Historie</div>
      <div class="hist-head">
        <span class="no">#</span>
        <span class="a">Allein</span>
        <span class="g">Gegen</span>
        <span class="t">T</span>
      </div>
      <div class="h-list" id="histList"></div>
    </div>
  </div>

</div>

<script>
  let scoreAllein = 0;
  let scoreGegen = 0;
  let trumpfTotal = 0;

  let selTens = null;   // 10, 20 oder 30
  let selUnit = null;   // 1 bis 9
  let trumpf = 0;       // Trümpfe der aktuellen Runde (0-3)
  let history = [];     // letzte Runden, max. 11
  let roundCounter = 0; // laufende Rundennummer

  const MAX_HISTORY = 11;

  const allEl    = document.getElementById('scoreAllein');
  const gegEl    = document.getElementById('scoreGegen');
  const trTotEl  = document.getElementById('trumpfTotal');
  const trumpfOpts = document.getElementById('trumpfOpts');
  const padBtns  = document.querySelectorAll('.pad button');
  const histList = document.getElementById('histList');

  function entryValue() {
    return (selTens || 0) + (selUnit || 0);
  }

  function render() {
    allEl.textContent   = scoreAllein;
    gegEl.textContent   = scoreGegen;
    trTotEl.textContent = trumpfTotal;

    trumpfOpts.querySelectorAll('button').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.trumpf, 10) === trumpf);
    });
    padBtns.forEach(b => {
      const isTens = b.dataset.tens !== undefined && parseInt(b.dataset.tens, 10) === selTens;
      const isUnit = b.dataset.unit !== undefined && parseInt(b.dataset.unit, 10) === selUnit;
      b.classList.toggle('active', isTens || isUnit);
    });
  }

  function renderHistory() {
    histList.innerHTML = '';
    history.forEach(h => {
      const row = document.createElement('div');
      row.className = 'hist-item ' + h.player;

      const no = document.createElement('span');
      no.className = 'no';
      no.textContent = h.no;

      const a = document.createElement('span');
      a.className = 'a';
      a.textContent = h.player === 'allein' ? h.pts : '';

      const g = document.createElement('span');
      g.className = 'g';
      g.textContent = h.player === 'gegen' ? h.pts : '';

      const t = document.createElement('span');
      t.className = 't';
      t.textContent = h.trumpf;

      row.appendChild(no);
      row.appendChild(a);
      row.appendChild(g);
      row.appendChild(t);
      histList.appendChild(row);
    });
  }

  // Trumpf-Auswahl der Runde
  trumpfOpts.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      trumpf = parseInt(btn.dataset.trumpf, 10);
      render();
    });
  });

  // Zifferblock: je ein Wert aus 10/20/30 und einer aus 1-9 (Toggle)
  padBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.tens) {
        const v = parseInt(btn.dataset.tens, 10);
        selTens = (selTens === v) ? null : v;
      } else {
        const v = parseInt(btn.dataset.unit, 10);
        selUnit = (selUnit === v) ? null : v;
      }
      render();
    });
  });

  function commit(player) {
    const pts = entryValue();
    if (player === 'allein') scoreAllein += pts;
    else                     scoreGegen += pts;
    trumpfTotal += trumpf;

    roundCounter += 1;
    history.unshift({ no: roundCounter, player: player, pts: pts, trumpf: trumpf });
    if (history.length > MAX_HISTORY) history.length = MAX_HISTORY;

    selTens = null;
    selUnit = null;
    trumpf = 0;
    render();
    renderHistory();
  }

  document.getElementById('toAllein').addEventListener('click', () => commit('allein'));
  document.getElementById('toGegen').addEventListener('click', () => commit('gegen'));

  // Alles zurücksetzen
  function doReset() {
    scoreAllein = 0;
    scoreGegen = 0;
    trumpfTotal = 0;
    selTens = null;
    selUnit = null;
    trumpf = 0;
    history = [];
    roundCounter = 0;
    render();
    renderHistory();
  }
  document.getElementById('reset').addEventListener('click', doReset);

  // Eine komplette Runde direkt buchen (für Spracheingabe)
  function bookRound(player, pts, trVal) {
    if (player === 'allein') scoreAllein += pts;
    else                     scoreGegen += pts;
    trumpfTotal += trVal;
    roundCounter += 1;
    history.unshift({ no: roundCounter, player: player, pts: pts, trumpf: trVal });
    if (history.length > MAX_HISTORY) history.length = MAX_HISTORY;
    render();
    renderHistory();
  }

  /* ---------- Spracherkennung ---------- */
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const micBtn   = document.getElementById('mic');
  const voicebar = document.getElementById('voicebar');
  let recog = null;
  let listening = false;

  function setStatus(text, cls) {
    voicebar.textContent = text;
    voicebar.className = 'voicebar' + (cls ? ' ' + cls : '');
  }

  function normalize(s) {
    return s.toLowerCase()
      .replace(/ß/g, 'ss')
      .replace(/ä/g, 'ae')
      .replace(/ö/g, 'oe')
      .replace(/ü/g, 'ue');
  }

  // deutsche Zahlwörter 0–99
  const WORDS = {
    null:0, ein:1, eins:1, eine:1, zwei:2, zwo:2, drei:3, vier:4, fuenf:5,
    sechs:6, sieben:7, acht:8, neun:9,
    zehn:10, elf:11, zwoelf:12, dreizehn:13, vierzehn:14, fuenfzehn:15,
    sechzehn:16, siebzehn:17, achtzehn:18, neunzehn:19,
    zwanzig:20, dreissig:30, vierzig:40, fuenfzig:50, sechzig:60,
    siebzig:70, achtzig:80, neunzig:90
  };

  function wordToNumber(tok) {
    if (/^\d+$/.test(tok)) return parseInt(tok, 10);
    if (tok in WORDS) return WORDS[tok];
    const m = tok.match(/^(.+?)und(.+)$/);   // z. B. vierunddreissig
    if (m && WORDS[m[1]] != null && WORDS[m[2]] != null) {
      return WORDS[m[2]] + WORDS[m[1]];
    }
    return null;
  }

  function numbersIn(str) {
    const out = [];
    str.split(/[^a-z0-9]+/).filter(Boolean).forEach(tok => {
      const n = wordToNumber(tok);
      if (n != null) out.push(n);
    });
    return out;
  }

  function parsePhrase(text) {
    const t = normalize(text);
    let player = null;
    if (t.includes('allein')) player = 'allein';
    else if (t.includes('gegen') || t.includes('gegn')) player = 'gegen';
    if (player === null) return null;

    let pts = null, tr = 0;
    const sep = t.search(/,|\bkomma\b/);   // Komma (Zeichen oder Wort) trennt Punkte | Trümpfe
    if (sep >= 0) {
      const before = numbersIn(t.slice(0, sep));
      const after  = numbersIn(t.replace(/^.*?(,|\bkomma\b)/, ''));
      if (before.length) pts = before[0];
      if (after.length)  tr  = after[0];
    } else {
      const nums = numbersIn(t);           // ohne Komma: 1. Zahl = Punkte, 2. = Trümpfe
      if (nums.length) pts = nums[0];
      if (nums.length > 1) tr = nums[1];
    }

    if (pts == null) return null;
    return { player: player, pts: pts, trumpf: Math.min(3, tr) };
  }

  function handleSpeech(text) {
    const p = parsePhrase(text);
    if (p) {
      bookRound(p.player, p.pts, p.trumpf);
      setStatus('✓ ' + (p.player === 'allein' ? 'Allein' : 'Gegen') +
                ' ' + p.pts + ' · ' + p.trumpf + 'T  („' + text + '")', 'ok');
      return;
    }
    if (/\b(reset|zuruecksetzen|loeschen)\b/.test(normalize(text))) {
      doReset();
      setStatus('✓ Reset („' + text + '")', 'ok');
      return;
    }
    setStatus('? nicht erkannt: „' + text + '"', 'bad');
  }

  function startListening() {
    if (!SR) { setStatus('Spracherkennung wird hier nicht unterstützt.', 'bad'); return; }
    if (!recog) {
      recog = new SR();
      recog.lang = 'de-DE';
      recog.continuous = true;
      recog.interimResults = false;
      recog.onresult = e => {
        const res = e.results[e.results.length - 1];
        if (res && res.isFinal) handleSpeech(res[0].transcript.trim());
      };
      recog.onerror = e => {
        if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
          setStatus('Mikrofon-Zugriff verweigert (nur über HTTPS möglich).', 'bad');
          stopListening();
        } else if (e.error === 'no-speech') {
          // ignorieren, läuft per onend weiter
        } else {
          setStatus('Fehler: ' + e.error, 'bad');
        }
      };
      recog.onend = () => { if (listening) { try { recog.start(); } catch (_) {} } };
    }
    listening = true;
    micBtn.classList.add('on');
    setStatus('🎤 hört zu … sag z. B. „Allein vierzehn, zwei"');
    try { recog.start(); } catch (_) {}
  }

  function stopListening() {
    listening = false;
    micBtn.classList.remove('on');
    if (recog) { try { recog.stop(); } catch (_) {} }
    setStatus('Spracheingabe aus – 🎤 antippen zum Starten.');
  }

  if (!SR) {
    micBtn.disabled = true;
    micBtn.style.opacity = 0.4;
    setStatus('Spracherkennung wird von diesem Browser nicht unterstützt.', 'bad');
  } else {
    micBtn.addEventListener('click', () => listening ? stopListening() : startListening());
  }

  render();
  renderHistory();
</script>
</body>
</html>
